<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clip">
      <rect x="3" y="3" width="94" height="94" rx="14" ry="14"/>
    </clipPath>
  </defs>
  <g clip-path="url(#clip)">
    <polygon points="0,0 100,0 0,100" fill="#ff1c1c"/>
    <polygon points="100,0 100,100 0,100" fill="#ffffff"/>
    <line x1="0" y1="100" x2="100" y2="0"
          stroke="#000" stroke-width="5.6"/>
    <circle cx="50" cy="50" r="12"
            fill="#ffffff"
            stroke="#000"
            stroke-width="5.6"/>
  </g>
  <rect x="3" y="3" width="94" height="94"
        rx="14" ry="14"
        fill="none"
        stroke="#000"
        stroke-width="6"/>
</svg>
